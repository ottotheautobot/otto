# Fly.io config for Resy booking server
app = "resy-booking-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  AUTH_TOKEN = "7f04b1c90f92a9dc30c9cdda557a89c783896ee122c1a7361c77f48024003648"
  RESY_COOKIES = "[]"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
