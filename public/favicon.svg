<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a472a"/>
  
  <!-- Vertical "OTTO" text on left (centered in left space) -->
  <text x="4.35" y="9" font-family="Arial, sans-serif" font-size="5.5" font-weight="bold" fill="#f5f5dc" text-anchor="middle">O</text>
  <text x="4.35" y="15" font-family="Arial, sans-serif" font-size="5.5" font-weight="bold" fill="#f5f5dc" text-anchor="middle">T</text>
  <text x="4.35" y="21" font-family="Arial, sans-serif" font-size="5.5" font-weight="bold" fill="#f5f5dc" text-anchor="middle">T</text>
  <text x="4.35" y="27" font-family="Arial, sans-serif" font-size="5.5" font-weight="bold" fill="#f5f5dc" text-anchor="middle">O</text>
  
  <!-- Clock circle (20% bigger, less space from text) -->
  <circle cx="19.5" cy="16" r="10.8" fill="#f5f5dc" stroke="#2d5a3d" stroke-width="1.8"/>
  
  <!-- Clock markers (12, 3, 6, 9) -->
  <circle cx="19.5" cy="6.2" r="0.9" fill="#2d5a3d"/>
  <circle cx="19.5" cy="25.8" r="0.9" fill="#2d5a3d"/>
  <circle cx="29.3" cy="16" r="0.9" fill="#2d5a3d"/>
  <circle cx="9.7" cy="16" r="0.9" fill="#2d5a3d"/>
  
  <!-- Smaller markers at other hours -->
  <circle cx="23.3" cy="9.1" r="0.5" fill="#2d5a3d"/>
  <circle cx="25.6" cy="11.4" r="0.5" fill="#2d5a3d"/>
  <circle cx="25.6" cy="20.6" r="0.5" fill="#2d5a3d"/>
  <circle cx="23.3" cy="22.9" r="0.5" fill="#2d5a3d"/>
  <circle cx="15.7" cy="22.9" r="0.5" fill="#2d5a3d"/>
  <circle cx="13.4" cy="20.6" r="0.5" fill="#2d5a3d"/>
  <circle cx="13.4" cy="11.4" r="0.5" fill="#2d5a3d"/>
  <circle cx="15.7" cy="9.1" r="0.5" fill="#2d5a3d"/>
  
  <!-- Clock hands -->
  <g>
    <!-- Hour hand pointing to 7 (dinner time) -->
    <line x1="19.5" y1="16" x2="15.6" y2="21.2" stroke="#c17817" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Minute hand pointing to 12 -->
    <line x1="19.5" y1="16" x2="19.5" y2="7.5" stroke="#c17817" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="19.5" cy="16" r="1.3" fill="#d4405f"/>
  </g>
</svg>
